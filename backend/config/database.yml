# PostgreSQL データベース設定
# 環境変数 DATABASE_URL が設定されている場合はそちらを優先

default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL", "postgres://postgres:password@db:5432/schedule_dev") %>

test:
  <<: *default
  url: <%= ENV.fetch("DATABASE_URL_TEST", "postgres://postgres:password@db:5432/schedule_test") %>

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>
