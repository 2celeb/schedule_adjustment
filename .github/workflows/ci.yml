# CI パイプライン
# プルリクエストおよび main ブランチへの push 時にテスト・Lint を実行

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # バックエンド: RSpec テスト
  # ============================================================
  backend-test:
    name: "Backend: RSpec"
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: schedule_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: backend

    env:
      RAILS_ENV: test
      DATABASE_URL: postgres://postgres:password@localhost:5432/schedule_test
      DATABASE_URL_TEST: postgres://postgres:password@localhost:5432/schedule_test
      REDIS_URL: redis://localhost:6379/0
      RAILS_SECRET_KEY_BASE: test_secret_key_base_for_ci
      ACTIVE_RECORD_ENCRYPTION_PRIMARY_KEY: ci_primary_key_for_testing_only
      ACTIVE_RECORD_ENCRYPTION_DETERMINISTIC_KEY: ci_deterministic_key_for_testing
      ACTIVE_RECORD_ENCRYPTION_KEY_DERIVATION_SALT: ci_key_derivation_salt_testing

    steps:
      - uses: actions/checkout@v4

      - name: Ruby セットアップ
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: backend

      - name: データベースセットアップ
        run: |
          bundle exec rails db:create db:migrate

      - name: RSpec テスト実行
        run: |
          bundle exec rspec --format documentation --format json --out tmp/rspec-results.json

      - name: テスト結果のアップロード
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rspec-results
          path: backend/tmp/rspec-results.json
          retention-days: 7

  # ============================================================
  # バックエンド: RuboCop Lint
  # ============================================================
  backend-lint:
    name: "Backend: RuboCop"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Ruby セットアップ
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: backend

      - name: RuboCop 実行
        run: |
          bundle exec rubocop --format progress --fail-level E

  # ============================================================
  # バックエンド: Brakeman セキュリティスキャン
  # ============================================================
  backend-security:
    name: "Backend: Brakeman"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Ruby セットアップ
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true
          working-directory: backend

      - name: Brakeman セキュリティスキャン
        run: |
          bundle exec brakeman --no-pager --no-exit-on-warn --format text

  # ============================================================
  # フロントエンド: Vitest テスト
  # ============================================================
  frontend-test:
    name: "Frontend: Vitest"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 依存関係インストール
        run: |
          npm ci || (rm -rf node_modules && npm i --no-optional && npm i @rollup/rollup-linux-x64-gnu)

      - name: Vitest テスト実行
        run: npm test

  # ============================================================
  # フロントエンド: ESLint + TypeScript 型チェック
  # ============================================================
  frontend-lint:
    name: "Frontend: ESLint + TypeScript"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 依存関係インストール
        run: |
          npm ci || (rm -rf node_modules && npm i --no-optional && npm i @rollup/rollup-linux-x64-gnu)

      - name: ESLint 実行
        run: npm run lint

      - name: TypeScript 型チェック
        run: npx tsc -b --noEmit

  # ============================================================
  # Discord Bot: Jest テスト
  # ============================================================
  bot-test:
    name: "Bot: Jest"
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: bot

    steps:
      - uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: bot/package-lock.json

      - name: 依存関係インストール
        run: npm ci

      - name: Jest テスト実行
        run: npm test
