# 開発環境用 Nginx リバースプロキシ設定
# /api/* → Rails API コンテナ（ポート 3000）
# /*     → React 開発サーバー（ポート 5173）

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;

    keepalive_timeout 65;

    # アップストリーム定義: Rails API
    upstream api {
        server api:3000;
    }

    # アップストリーム定義: React 開発サーバー
    upstream frontend {
        server frontend:5173;
    }

    server {
        listen 80;
        server_name localhost;

        # リクエストボディの最大サイズ
        client_max_body_size 10M;

        # /api/* → Rails API コンテナへプロキシ
        location /api/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /oauth/* → Rails API コンテナへプロキシ（OAuth コールバック用）
        location /oauth/ {
            proxy_pass http://api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # /* → React 開発サーバーへプロキシ
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Vite HMR（Hot Module Replacement）用 WebSocket 対応
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
